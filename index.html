/* ================================================================
   AI HUMANIZER & DETECTOR  —  QuillBot-style analysis
   ----------------------------------------------------------------
   Two layers working together:

   1. DETECTOR  — scores the whole text and every sentence for how
      "AI-written" it reads, using structural signals (not just
      vocabulary): sentence-length uniformity (burstiness),
      predictable openers, formulaic structure, hedging, lexical
      repetition, and AI-favourite vocabulary density. Produces a
      0-100% AI-likelihood score and a per-sentence verdict
      (AI / AI-refined / Human) with an explainer for each.

   2. HUMANIZER — word- and phrase-level swapping. Click any flagged
      term to replace it with a plainer alternative; the rebuilt
      paragraph and the re-scored percentage update live.
   ================================================================ */

/* sentence openers AI overuses heavily */
const AI_OPENERS = [
  "moreover","furthermore","additionally","however","in conclusion",
  "in summary","overall","ultimately","notably","importantly",
  "first","firstly","second","secondly","third","thirdly","finally",
  "in today's","in the world","as we","it is important","it's important",
  "in this","this","these","there are","there is","one of the",
];

/* hedging / filler phrases that inflate AI-likelihood */
const HEDGES = [
  "it is important to","it's important to","it is worth","it should be noted",
  "plays a role","plays a crucial","plays a vital","plays a key",
  "when it comes to","in order to","a wide range","a variety of",
  "not only","but also","as well as","ranging from","whether it",
];

function expand(base){
  const out={};
  for(const[word,def]of Object.entries(base)){
    out[word]=def;
    const{w,alt}=def;
    const forms=new Set();
    if(/[^s]$/.test(word))forms.add(word+"s");
    if(/e$/.test(word)){forms.add(word.slice(0,-1)+"ing");forms.add(word+"d");}
    else{forms.add(word+"ing");forms.add(word+"ed");}
    if(/[^y]$/.test(word)&&!/ly$/.test(word))forms.add(word+"ly");
    for(const f of forms)if(!out[f]&&!base[f])out[f]={w,alt};
  }
  return out;
}
const LEXICON=expand(BASE);
const WEIGHT_LABEL={3:"very AI-like",2:"AI-leaning",1:"soft flag"};

/* ---------------------------------------------------------------
   TOKENISER  — words + gaps, so the text rebuilds exactly
   --------------------------------------------------------------- */
function tokenize(text){
  const tokens=[];
  const re=/([A-Za-z][A-Za-z'\u2019-]*)|([^A-Za-z]+)/g;
  let m,id=0;
  while((m=re.exec(text))!==null){
    if(m[1]!==undefined){
      const word=m[1];
      const clean=word.toLowerCase().replace(/['\u2019]/g,"'").replace(/-/g,"");
      const cleanHyphen=word.toLowerCase().replace(/['\u2019]/g,"'");
      const def=LEXICON[clean]||LEXICON[cleanHyphen];
      tokens.push({id:id++,type:"word",text:word,clean,cleanHyphen,
        score:def?def.w:0,alt:def?def.alt:null});
    }else{
      tokens.push({id:id++,type:"gap",text:m[2]});
    }
  }
  return tokens;
}

function detectPhrases(tokens){
  const wordIdx=tokens.map((t,i)=>(t.type==="word"?i:-1)).filter(i=>i>=0);
  const hits=[];const used=new Set();
  for(let p=0;p<wordIdx.length;p++){
    for(let len=6;len>=2;len--){
      if(p+len>wordIdx.length)continue;
      const slice=[];
      for(let k=0;k<len;k++)slice.push(wordIdx[p+k]);
      if(slice.some(i=>used.has(i)))continue;
      const startTok=slice[0],endTok=slice[len-1];
      const phraseText=tokens.slice(startTok,endTok+1).map(t=>t.text).join("")
        .toLowerCase().replace(/['\u2019]/g,"'").trim();
      const def=PHRASES[phraseText];
      if(def){hits.push({startTok,endTok,def,key:phraseText});
        slice.forEach(i=>used.add(i));break;}
    }
  }
  return hits;
}

/* ---------------------------------------------------------------
   SENTENCE SPLITTER  — keeps character offsets for highlighting
   --------------------------------------------------------------- */
function splitSentences(text){
  const out=[];
  const re=/[^.!?]+[.!?]+(?:["'\u2019\u201d)\]]*)|[^.!?]+$/g;
  let m;
  while((m=re.exec(text))!==null){
    const raw=m[0];
    if(raw.trim().length===0)continue;
    out.push({raw,start:m.index,end:m.index+raw.length});
  }
  if(out.length===0&&text.trim().length)
    out.push({raw:text,start:0,end:text.length});
  return out;
}

/* ---------------------------------------------------------------
   SENTENCE SCORING  — the core detector heuristic
   Returns {score 0-100, signals:[{label,detail,pts}], wordCount}
   --------------------------------------------------------------- */
function scoreSentence(sentence,allLengths,idx){
  const words=(sentence.toLowerCase().match(/[a-z][a-z'\u2019-]*/g)||[]);
  const wc=words.length;
  const signals=[];
  let pts=0;

  /* 1. AI-vocabulary density */
  let lexHits=0,lexWeight=0;
  words.forEach(w=>{
    const c=w.replace(/['\u2019]/g,"'").replace(/-/g,"");
    const d=LEXICON[c]||LEXICON[w.replace(/['\u2019]/g,"'")];
    if(d){lexHits++;lexWeight+=d.w;}
  });
  if(lexHits>0){
    const density=lexWeight/Math.max(wc,1);
    /* density component + a flat bump per flagged term so a few
       strong buzzwords register even in a longer sentence */
    const p=Math.min(40,Math.round(density*78)+Math.min(12,lexHits*3));
    pts+=p;
    signals.push({label:"AI-favoured vocabulary",
      detail:lexHits+" flagged term"+(lexHits>1?"s":"")+" in this sentence",
      pts:p});
  }

  /* 2. predictable opener */
  const low=sentence.trim().toLowerCase();
  const opener=AI_OPENERS.find(o=>low.startsWith(o+" ")||low.startsWith(o+","));
  if(opener){
    pts+=12;
    signals.push({label:"Formulaic opener",
      detail:"starts with \u201c"+opener+"\u201d \u2014 a common AI sentence opener",
      pts:12});
  }

  /* 3. hedging / filler */
  let hedgeHits=0;
  HEDGES.forEach(h=>{if(low.includes(h))hedgeHits++;});
  if(hedgeHits>0){
    const p=Math.min(16,hedgeHits*9);
    pts+=p;
    signals.push({label:"Hedging / filler phrasing",
      detail:hedgeHits+" filler construction"+(hedgeHits>1?"s":""),pts:p});
  }

  /* 4. sentence length vs. the document — uniformity & long-windedness */
  if(allLengths.length>=3){
    const mean=allLengths.reduce((a,b)=>a+b,0)/allLengths.length;
    const variance=allLengths.reduce((a,b)=>a+(b-mean)*(b-mean),0)/allLengths.length;
    const sd=Math.sqrt(variance);
    /* low burstiness across the doc: every sentence close to the mean */
    if(sd<6&&allLengths.length>=4){
      pts+=10;
      signals.push({label:"Uniform rhythm",
        detail:"all sentences are a similar length \u2014 low \u201cburstiness\u201d",
        pts:10});
    }
    /* this sentence very close to mean while doc is uniform */
    if(wc>26){
      pts+=8;
      signals.push({label:"Long, dense sentence",
        detail:wc+" words \u2014 AI tends to pack clauses together",pts:8});
    }
  }

  /* 5. parallel "X, Y, and Z" triadic list — an AI tell */
  const commaCount=(sentence.match(/,/g)||[]).length;
  if(commaCount>=2&&/\band\b/.test(low)){
    pts+=7;
    signals.push({label:"Triadic list structure",
      detail:"balanced \u201cA, B, and C\u201d listing \u2014 a frequent AI pattern",
      pts:7});
  }

  /* 6. no concrete detail — no digits, no proper specifics */
  const hasNumber=/\d/.test(sentence);
  if(wc>=12&&!hasNumber){
    pts+=4;
    signals.push({label:"No concrete detail",
      detail:"no numbers or specifics \u2014 reads generic",pts:4});
  }

  const score=Math.max(0,Math.min(100,pts));
  return {score,signals,wordCount:wc};
}

/* verdict bucket from a sentence score */
function verdictOf(score){
  if(score>=55)return{key:"ai",label:"Likely AI",cls:"sv-ai"};
  if(score>=28)return{key:"refined",label:"AI-refined",cls:"sv-refined"};
  return{key:"human",label:"Likely human",cls:"sv-human"};
}

function matchCase(original,replacement){
  if(!replacement)return replacement;
  if(original===original.toUpperCase()&&original.length>1)
    return replacement.toUpperCase();
  if(original[0]===original[0].toUpperCase())
    return replacement[0].toUpperCase()+replacement.slice(1);
  return replacement;
}

/* ================================================================
   SENTENCE-LEVEL TRANSFORMS — the real GPTZero-fooling work
   ----------------------------------------------------------------
   Word-swaps don't drop perplexity much; GPTZero looks at token
   predictability and sentence-rhythm uniformity. These transforms
   target those signals directly:

     1.  Contractions      ("it is" -> "it's")  — AI almost never
         contracts; humans always do. Single biggest tell.
     2.  Stripped openers  ("Moreover, " -> "")  — formulaic
         transitions are uniform and predictable.
     3.  Em-dash removal   (" — " -> ", ")  — modern GPTs over-use
         em-dashes; their density is a strong flag.
     4.  Sentence splitting at long ", and"/", but" joins — boosts
         burstiness (length variance) and breaks rhythm uniformity.
     5.  Padding-phrase removal ("It is important to note that…").
   ================================================================ */

  [/\bhas not\b/g,"hasn't"],[/\bHas not\b/g,"Hasn't"],
  [/\bhave not\b/g,"haven't"],[/\bHave not\b/g,"Haven't"],
  [/\bhad not\b/g,"hadn't"],[/\bHad not\b/g,"Hadn't"],
  [/\bI am\b/g,"I'm"],
  [/\bwe are\b/g,"we're"],[/\bWe are\b/g,"We're"],

/* Openers/markers to delete entirely from sentence starts. */
const OPENER_STRIPS=[
  "Moreover","Furthermore","Additionally","Notably","Importantly",
  "Ultimately","In conclusion","In summary","Overall","Indeed",
  "Essentially","Arguably","Specifically","In fact","To begin with",
  "First and foremost","Last but not least","Needless to say",

/* Formal/AI connectors rewritten to plain ones. */
const OPENER_REWRITES=[
  [/(^|[.!?]\s+)Consequently,\s+/g,"$1So "],
  [/(^|[.!?]\s+)Subsequently,\s+/g,"$1Then "],
  [/(^|[.!?]\s+)Therefore,\s+/g,"$1So "],
  [/(^|[.!?]\s+)Hence,\s+/g,"$1So "],
  [/(^|[.!?]\s+)Thus,\s+/g,"$1So "],
  [/(^|[.!?]\s+)However,\s+/g,"$1But "],
  [/(^|[.!?]\s+)Nevertheless,\s+/g,"$1Still, "],
  [/(^|[.!?]\s+)Nonetheless,\s+/g,"$1Still, "],
];

/* Padding phrases stripped from sentence starts (the next word is
   re-capitalized so the result still reads grammatical). */
const PADDING_STRIPS=[
  /It is important to note that\s+/i,
  /It's important to note that\s+/i,
  /It is worth noting that\s+/i,
  /It's worth noting that\s+/i,
  /It should be noted that\s+/i,
  /It must be noted that\s+/i,
  /It goes without saying that\s+/i,
];

function applySentenceTransforms(text){
  let s=text;

  /* 1. Strip padding phrases (then re-cap next word) */
  PADDING_STRIPS.forEach(re=>{
    const g=new RegExp("(^|[.!?]\\s+)"+re.source+"([a-z])","gi");
    s=s.replace(g,(_m,p,c)=>p+c.toUpperCase());
  });

  /* 2. Strip formulaic openers (delete opener + comma, cap next word) */
  OPENER_STRIPS.forEach(o=>{
    const esc=o.replace(/[.*+?^${}()|[\]\\]/g,"\\$&").replace(/\s/g,"\\s");
    const re=new RegExp("(^|[.!?]\\s+)"+esc+",\\s+([a-z])","gi");
    s=s.replace(re,(_m,p,c)=>p+c.toUpperCase());
  });

  /* 3. Rewrite formal connectors */
  OPENER_REWRITES.forEach(([re,sub])=>{s=s.replace(re,sub);});

  /* 4. Contractions */
  CONTRACTIONS.forEach(([re,sub])=>{s=s.replace(re,sub);});

  /* 5. Em-dash to comma (modern-GPT tell) */
  s=s.replace(/\s*[—–]\s*/g,", ");
  s=s.replace(/\s+--\s+/g,", ");

  /* 6. Split overly long sentences at ", and"/", but"/", so" */
  s=splitLongSentences(s,26);

  /* 7. Tidy whitespace + orphan punctuation */
  s=s.replace(/\s+([.,;:!?])/g,"$1");
  s=s.replace(/\s{2,}/g," ");
  return s.trim();
}

function splitLongSentences(text,threshold){
  return text.replace(/[^.!?]+[.!?]+/g,sentence=>{
    const wc=(sentence.match(/\b[a-zA-Z]+\b/g)||[]).length;
    if(wc<threshold)return sentence;
    const m=sentence.match(/,\s+(and|but|so|yet|or|because)\s+/i);
    if(!m||m.index<12)return sentence;
    const first=sentence.slice(0,m.index).trim();
    let rest=sentence.slice(m.index+m[0].length).trim();
    rest=rest.charAt(0).toUpperCase()+rest.slice(1);
    return first+". "+rest;
  });
}

/* Pure assembly helper — applies word + phrase swaps to the token
   stream and produces a string. Extracted so autoHumanize can call
   it with freshly-built swap maps before running text transforms. */
function assembleText(tokens,swaps,phraseSwaps,phraseByStart){
  let res="",i=0;
  while(i<tokens.length){
    const t=tokens[i];
    const ph=phraseByStart[i];
    if(ph&&phraseSwaps[ph.startTok+"-"+ph.endTok]!==undefined){
      res+=phraseSwaps[ph.startTok+"-"+ph.endTok];
      i=ph.endTok+1;continue;
    }
    res+=t.type==="word"?(swaps[t.id]??t.text):t.text;
    i++;
  }
  return res.replace(/\s{2,}/g," ").replace(/\s+([.,;:])/g,"$1");
}

const SAMPLE=
  "In today's world, leveraging cutting-edge technology plays a crucial "+
  "role in the realm of healthcare. It is important to note that a "+
  "comprehensive and robust framework can facilitate seamless workflows, "+
  "ultimately empowering clinicians to navigate an ever-evolving "+
  "landscape. Moreover, this groundbreaking approach fosters a rich "+
  "tapestry of meticulous, data-driven solutions. Furthermore, it "+
  "underscores the pivotal interplay between innovation and patient care.";

/* ================================================================
   MAIN COMPONENT
   ================================================================ */
function Humanizer(){
  const [raw,setRaw]=useState(SAMPLE);
  const [swaps,setSwaps]=useState({});
  const [phraseSwaps,setPhraseSwaps]=useState({});
  const [active,setActive]=useState(null);
  const [activePhrase,setActivePhrase]=useState(null);
  const [minWeight,setMinWeight]=useState(1);
  const [tab,setTab]=useState("detector"); // detector | humanizer
  const [openSentence,setOpenSentence]=useState(null);
  const [autoBusy,setAutoBusy]=useState(false);
  const [autoProgress,setAutoProgress]=useState({done:0,total:0});
  const [rawBackup,setRawBackup]=useState(null);

  /* current working text = raw with all swaps applied */
  const tokens=useMemo(()=>tokenize(raw),[raw]);
  const phrases=useMemo(()=>detectPhrases(tokens),[tokens]);

  const {phraseByStart,coveredByPhrase}=useMemo(()=>{
    const byStart={},covered={};
    phrases.forEach(ph=>{
      if(ph.def.w<minWeight)return;
      byStart[ph.startTok]=ph;
      for(let i=ph.startTok;i<=ph.endTok;i++)covered[i]=ph;
    });
    return{phraseByStart:byStart,coveredByPhrase:covered};
  },[phrases,minWeight]);

  const workingText=useMemo(
    ()=>assembleText(tokens,swaps,phraseSwaps,phraseByStart),
    [tokens,swaps,phraseSwaps,phraseByStart]);

  /* ---- DETECTOR analysis over the working text ---- */
  const analysis=useMemo(()=>{
    const sents=splitSentences(workingText);
    const lengths=sents.map(s=>
      (s.raw.toLowerCase().match(/[a-z][a-z'\u2019-]*/g)||[]).length);
    const scored=sents.map((s,i)=>{
      const r=scoreSentence(s.raw,lengths,i);
      return {...s,...r,idx:i,verdict:verdictOf(r.score)};
    });
    const totalWords=lengths.reduce((a,b)=>a+b,0)||1;
    /* document score = word-weighted mean of sentence scores,
       nudged up if many sentences are AI and rhythm is uniform */
    let weighted=0;
    scored.forEach(s=>{weighted+=s.score*Math.max(s.wordCount,1);});
    let docScore=weighted/totalWords;
    const aiCount=scored.filter(s=>s.verdict.key==="ai").length;
    if(aiCount>=Math.ceil(scored.length/2)&&scored.length>=3)docScore+=8;
    docScore=Math.max(0,Math.min(100,Math.round(docScore)));
    const counts={
      ai:scored.filter(s=>s.verdict.key==="ai").length,
      refined:scored.filter(s=>s.verdict.key==="refined").length,
      human:scored.filter(s=>s.verdict.key==="human").length,
    };
    /* GPTZero-style metrics surfaced to the user.
       Perplexity proxy: how predictable the text is. We estimate it from
       AI-favoured vocabulary density + formulaic-opener and hedging hits.
       Higher number = more predictable = more AI-like.
       Burstiness: variation in sentence length. Real humans vary; AI is
       uniform. Std-deviation of sentence-word-counts. Higher = more human. */
    let perpRaw=0;
    scored.forEach(s=>{
      s.signals.forEach(sig=>{
        if(sig.label==="AI-favoured vocabulary"||
           sig.label==="Formulaic opener"||
           sig.label==="Hedging / filler phrasing")perpRaw+=sig.pts;
      });
    });
    const perplexity=scored.length
      ?Math.min(100,Math.round(perpRaw/scored.length*1.6))
      :0;
    let burstiness=0;
    if(lengths.length>=2){
      const m=totalWords/lengths.length;
      const v=lengths.reduce((a,l)=>a+(l-m)*(l-m),0)/lengths.length;
      burstiness=Math.round(Math.sqrt(v)*10)/10;
    }
    return {sents:scored,docScore,counts,totalWords,
            sentenceCount:scored.length,perplexity,burstiness};
  },[workingText]);

  /* document verdict label */
  const docVerdict=useMemo(()=>{
    const s=analysis.docScore;
    if(s>=60)return{label:"Likely AI-generated",cls:"big-ai"};
    if(s>=30)return{label:"Possibly AI-refined",cls:"big-refined"};
    return{label:"Likely human-written",cls:"big-human"};
  },[analysis.docScore]);

  const reset=useCallback(()=>{
    setSwaps({});setPhraseSwaps({});
    setActive(null);setActivePhrase(null);setOpenSentence(null);
  },[]);

  /* AUTO-HUMANIZE — sweep every flagged word & phrase and swap them.
     Phrases use the curated alts. Single words try the Datamuse online API
     first (real synonyms) and fall back to the offline thesaurus. */
  const autoHumanize=useCallback(async()=>{
    if(autoBusy)return;
    setAutoBusy(true);
    const newSwaps={...swaps};
    const newPhraseSwaps={...phraseSwaps};

    /* 1. Phrase-level swaps first (longer matches win) */
    Object.values(phraseByStart).forEach(ph=>{
      const key=ph.startTok+"-"+ph.endTok;
      if(newPhraseSwaps[key]!==undefined)return;
      const alts=ph.def.alt||[];
      if(!alts.length)return;
      const original=tokens.slice(ph.startTok,ph.endTok+1)
        .map(t=>t.text).join("");
      /* rotate pick by start index so repeated phrases vary */
      const pick=alts[ph.startTok%alts.length];
      newPhraseSwaps[key]=matchCase(original,pick);
    });

    /* 2. Word-level swaps for every flagged word not covered by a phrase */
    const todo=tokens.filter(t=>
      t.type==="word"&&
      !coveredByPhrase[t.id]&&
      (t.score||0)>=1&&
      newSwaps[t.id]===undefined);
    setAutoProgress({done:0,total:todo.length});

    let done=0;
    for(const t of todo){
      const word=t.text.toLowerCase().replace(/['’]/g,"'");
      let pick=null;
      /* online first — Datamuse returns real-world synonyms */
      try{
        const syns=await fetchSynonyms(word);
        if(syns&&syns.length){
          /* pick a synonym that isn't the same word, prefer shorter ones
             (humans use plain words more than AI does) */
          const candidates=syns.filter(s=>{
            const c=s.toLowerCase();
            return c!==word&&!c.includes(" ")&&c.length<=word.length+4;
          });
          if(candidates.length)pick=candidates[t.id%candidates.length];
          else pick=syns[0];
        }
      }catch(_){}
      /* offline fallback from the curated thesaurus */
      if(!pick){
        const def=LEXICON[word]||LEXICON[word.replace(/['’]/g,"'")];
        const alts=def?.alt||[];
        if(alts.length)pick=alts[t.id%alts.length];
      }
      if(pick&&pick.toLowerCase()!==word){
        newSwaps[t.id]=matchCase(t.text,pick);
      }
      done++;
      if(done%4===0||done===todo.length){
        setAutoProgress({done,total:todo.length});
      }
    }

    /* 3. Assemble swapped text, then run sentence-level transforms
          (contractions, opener strip, em-dash kill, sentence split).
          This is where most of the GPTZero score actually drops. */
    const swapped=assembleText(tokens,newSwaps,newPhraseSwaps,phraseByStart);
    const rewritten=applySentenceTransforms(swapped);

    /* 4. Replace the raw text with the rewritten version. Tokens,
          phrases, analysis all recompute automatically. Keep a backup
          so the user can undo. */
    setRawBackup(raw);
    setRaw(rewritten);
    setSwaps({});
    setPhraseSwaps({});
    setActive(null);setActivePhrase(null);setOpenSentence(null);
    setAutoBusy(false);
    setAutoProgress({done:0,total:0});
  },[autoBusy,raw,swaps,phraseSwaps,tokens,phraseByStart,coveredByPhrase]);

  const undoAuto=useCallback(()=>{
    if(rawBackup===null)return;
    setRaw(rawBackup);
    setRawBackup(null);
    setSwaps({});setPhraseSwaps({});
    setActive(null);setActivePhrase(null);setOpenSentence(null);
  },[rawBackup]);

  const stats=useMemo(()=>{
    let w3=0,w2=0,w1=0,words=0;
    tokens.forEach(t=>{
      if(t.type!=="word")return;
      words++;
      if(coveredByPhrase[t.id])return;
      if(t.score===3)w3++;else if(t.score===2)w2++;else if(t.score===1)w1++;
    });
    const pw=Object.keys(phraseByStart).length;
    const flagged=(minWeight<=3?w3:0)+(minWeight<=2?w2:0)+
                  (minWeight<=1?w1:0)+pw;
    return{w3,w2,w1,words,flagged,
      swapped:Object.keys(swaps).length+Object.keys(phraseSwaps).length};
  },[tokens,swaps,phraseSwaps,phraseByStart,coveredByPhrase,minWeight]);

  const copyOutput=()=>navigator.clipboard&&navigator.clipboard.writeText(workingText);

  /* -------- HUMANIZER canvas (word/phrase swapping) -------- */
  /* render a single word or phrase token as a clickable span */
  function renderWordToken(i){
    const t=tokens[i];
    const ph=phraseByStart[i];
    if(ph){
      const pkey=ph.startTok+"-"+ph.endTok;
      const swapped=phraseSwaps[pkey]!==undefined;
      const original=tokens.slice(ph.startTok,ph.endTok+1).map(x=>x.text).join("");
      const cls=swapped?"tok swapped":ph.def.w===3?"tok w3":"tok w2";
      return {
        node:(
          <span key={"p"+i} style={{position:"relative"}}>
            <span className={cls}
              onClick={()=>setActivePhrase(activePhrase===pkey?null:pkey)}>
              {swapped?phraseSwaps[pkey]:original}
            </span>
            {activePhrase===pkey&&(
              <Popover label={original} weight={ph.def.w} alts={ph.def.alt}
                swapped={swapped}
                onPick={v=>{setPhraseSwaps(s=>({...s,[pkey]:v}));setActivePhrase(null);}}
                onUndo={()=>{setPhraseSwaps(s=>{const n={...s};delete n[pkey];return n;});setActivePhrase(null);}}
                onClose={()=>setActivePhrase(null)}/>
            )}
          </span>
        ),
        next:ph.endTok+1,
      };
    }
    if(t.type!=="word")return {node:<span key={i}>{t.text}</span>,next:i+1};
    const swapped=swaps[t.id]!==undefined;
    const flagged=t.score>=minWeight;
    const cls=swapped?"tok swapped"
            :flagged&&t.score===3?"tok w3"
            :flagged&&t.score===2?"tok w2"
            :flagged?"tok w1":"tok plain";
    return {
      node:(
        <span key={i} style={{position:"relative"}}>
          <span className={cls}
            onClick={()=>setActive(active===t.id?null:t.id)}>
            {swapped?swaps[t.id]:t.text}
          </span>
          {active===t.id&&(
            <Popover label={t.text} weight={t.score} alts={t.alt||[]}
              swapped={swapped}
              onPick={v=>{setSwaps(s=>({...s,[t.id]:matchCase(t.text,v)}));setActive(null);}}
              onUndo={()=>{setSwaps(s=>{const n={...s};delete n[t.id];return n;});setActive(null);}}
              onClose={()=>setActive(null)}/>
          )}
        </span>
      ),
      next:i+1,
    };
  }

  /* canvas with EVERY word clickable, optionally tinted by the
     sentence-level verdict. words map to sentences by character
     position in the working text. */
  function renderHumanizerCanvas(showSentenceColor){
    /* character offset where each token starts in workingText */
    const tokenOffsets=[];
    let pos=0;
    for(let k=0;k<tokens.length;k++){
      const t=tokens[k];
      const ph=phraseByStart[k];
      tokenOffsets[k]=pos;
      let text;
      if(ph&&ph.startTok===k&&phraseSwaps[ph.startTok+"-"+ph.endTok]!==undefined){
        text=phraseSwaps[ph.startTok+"-"+ph.endTok];
      }else if(t.type==="word"){
        text=swaps[t.id]??t.text;
      }else{
        text=t.text;
      }
      pos+=text.length;
    }
    /* which sentence covers a given character offset */
    const sents=analysis.sents;
    function sentenceAt(offset){
      for(let s=0;s<sents.length;s++){
        if(offset>=sents[s].start&&offset<sents[s].end)return sents[s];
      }
      return sents.length?sents[sents.length-1]:null;
    }

    const out=[];
    let i=0;
    let groupSent=null;
    let group=[];
    const flushGroup=(key)=>{
      if(group.length===0)return;
      if(showSentenceColor&&groupSent){
        const cls="sentbg "+groupSent.verdict.cls;
        out.push(
          <span key={"g"+key} className={cls}
            title={groupSent.verdict.label+" \u2014 "+groupSent.score+"% AI"}>
            {group}
          </span>
        );
      }else{
        out.push(<span key={"g"+key}>{group}</span>);
      }
      group=[];
    };

    while(i<tokens.length){
      const sentHere=sentenceAt(tokenOffsets[i]);
      if(showSentenceColor&&sentHere!==groupSent){
        flushGroup(i);
        groupSent=sentHere;
      }
      const {node,next}=renderWordToken(i);
      group.push(node);
      i=next;
    }
    flushGroup("end");
    return out;
  }

  return (
    <div style={S.page}>
      <style>{CSS}</style>

      <header style={S.header}>
        <h1 style={S.title}>AI Humanizer &amp; Detector</h1>
        <p style={S.sub}>
          Sentence-level AI scoring plus word-by-word humanizing.
          Paste text, read the verdict, then swap the flagged parts.
        </p>
      </header>

      {/* INPUT */}
      <section style={S.card}>
        <label style={S.label}>Your text</label>
        <textarea style={S.textarea} rows={6} value={raw}
          placeholder="Paste a paragraph or essay here..."
          onChange={e=>{
            setRaw(e.target.value);
            setSwaps({});setPhraseSwaps({});
            setActive(null);setActivePhrase(null);setOpenSentence(null);
            setRawBackup(null);
          }}/>
      </section>

      {/* SCORE GAUGE */}
      <section style={{...S.card,...S.scoreCard}}>
        <Gauge score={analysis.docScore}/>
        <div style={S.scoreSide}>
          <div className={"bigVerdict "+docVerdict.cls}>
            {docVerdict.label}
          </div>
          <p style={S.scoreText}>
            {analysis.docScore}% of this text reads as AI-written,
            based on {analysis.sentenceCount} sentence
            {analysis.sentenceCount!==1?"s":""} and {analysis.totalWords} words.
          </p>
          <div style={S.verdictPills}>
            <Pill n={analysis.counts.ai} label="AI" cls="sv-ai"/>
            <Pill n={analysis.counts.refined} label="refined" cls="sv-refined"/>
            <Pill n={analysis.counts.human} label="human" cls="sv-human"/>
          </div>
          <div style={S.metricRow}>
            <div style={S.metricBox}>
              <div style={S.metricVal}>{analysis.perplexity}</div>
              <div style={S.metricLbl}>Perplexity proxy</div>
              <div style={S.metricHint}>lower = more AI-like</div>
            </div>
            <div style={S.metricBox}>
              <div style={S.metricVal}>{analysis.burstiness}</div>
              <div style={S.metricLbl}>Burstiness</div>
              <div style={S.metricHint}>higher = more human</div>
            </div>
          </div>
          <div style={S.autoRow}>
            <button
              style={{...S.btnAuto,...(autoBusy?S.btnAutoBusy:{})}}
              disabled={autoBusy}
              onClick={autoHumanize}>
              {autoBusy
                ?("Humanizing… "+(autoProgress.total
                    ?Math.round(autoProgress.done/autoProgress.total*100)+"%"
                    :""))
                :"Auto-humanize all"}
            </button>
            {rawBackup!==null&&(
              <button style={S.btnGhost} onClick={undoAuto} disabled={autoBusy}>
                Undo auto-humanize
              </button>
            )}
            <button style={S.btnGhost} onClick={reset} disabled={autoBusy}>
              Reset swaps
            </button>
          </div>
        </div>
      </section>

      {/* TABS */}
      <div style={S.tabRow}>
        <button style={{...S.tab,...(tab==="detector"?S.tabActive:{})}}
          onClick={()=>setTab("detector")}>Detector</button>
        <button style={{...S.tab,...(tab==="humanizer"?S.tabActive:{})}}
          onClick={()=>setTab("humanizer")}>Humanizer</button>
      </div>

      {/* ---------------- DETECTOR TAB ---------------- */}
      {tab==="detector"&&(
        <section style={S.card}>
          <div style={S.legend}>
            <Legend cls="sv-ai" txt="likely AI"/>
            <Legend cls="sv-refined" txt="AI-refined"/>
            <Legend cls="sv-human" txt="likely human"/>
          </div>
          <p style={S.hint}>
            Sentences are tinted by AI-likelihood &mdash; but every word is
            clickable, even in sentences rated human. Click any word to
            swap it; click the verdict badges below for the why.
          </p>
          <div style={S.sentCanvas}>
            {renderHumanizerCanvas(true)}
          </div>
          {/* per-sentence explainers, listed below the text */}
          <div style={S.sentList}>
            {analysis.sents.map(s=>(
              <div key={s.idx}>
                <button
                  className={"sentRow "+s.verdict.cls}
                  onClick={()=>setOpenSentence(openSentence===s.idx?null:s.idx)}>
                  <span className={"sv-tag "+s.verdict.cls}>
                    {s.verdict.label}
                  </span>
                  <span style={S.sentRowScore}>{s.score}% AI</span>
                  <span style={S.sentRowText}>
                    {s.raw.trim().slice(0,52)}
                    {s.raw.trim().length>52?"\u2026":""}
                  </span>
                  <span style={S.sentRowChev}>
                    {openSentence===s.idx?"\u2212":"+"}
                  </span>
                </button>
                {openSentence===s.idx&&(
                  <div style={S.sentExplain}>
                    {s.signals.length>0?(
                      <ul style={S.scList}>
                        {s.signals.map((sig,k)=>(
                          <li key={k} style={S.scItem}>
                            <span style={S.scPts}>+{sig.pts}</span>
                            <span><strong>{sig.label}.</strong> {sig.detail}</span>
                          </li>
                        ))}
                      </ul>
                    ):(
                      <p style={S.scNone}>
                        No strong AI signals &mdash; this sentence reads natural.
                      </p>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
          <div style={S.detFoot}>
            <Mini n={analysis.counts.ai} label="AI sentences" tone="ai"/>
            <Mini n={analysis.counts.refined} label="AI-refined" tone="refined"/>
            <Mini n={analysis.counts.human} label="human" tone="human"/>
            <Mini n={stats.flagged} label="flagged words" tone="warn"/>
          </div>
        </section>
      )}

      {/* ---------------- HUMANIZER TAB ---------------- */}
      {tab==="humanizer"&&(
        <>
          <div style={S.ctrlRow}>
            <span style={S.ctrlLabel}>Flag sensitivity</span>
            {[[1,"Aggressive"],[2,"Balanced"],[3,"Strict"]].map(([v,lbl])=>(
              <button key={v}
                style={{...S.segBtn,...(minWeight===v?S.segBtnActive:{})}}
                onClick={()=>setMinWeight(v)}>{lbl}</button>
            ))}
            <button style={S.btnGhost} onClick={reset}>Reset swaps</button>
          </div>
          <section style={S.card}>
            <div style={S.legend}>
              <Legend cls="w3" txt="very AI-like"/>
              <Legend cls="w2" txt="AI-leaning"/>
              {minWeight===1&&<Legend cls="w1" txt="soft flag"/>}
              <Legend cls="swapped" txt="swapped"/>
            </div>
            <p style={S.hint}>
              Every word is clickable &mdash; coloured words are AI-flagged,
              dotted-underline words are clean but still swappable.
              Click any word for synonyms; the score gauge updates as you go.
            </p>
            <div style={S.canvas}>{renderHumanizerCanvas(false)}</div>
            <div style={S.detFoot}>
              <Mini n={stats.words} label="words" tone="neutral"/>
              <Mini n={stats.flagged} label="flagged" tone="warn"/>
              <Mini n={stats.swapped} label="swapped" tone="good"/>
            </div>
          </section>
        </>
      )}

      {/* OUTPUT */}
      <section style={{...S.card,...S.outputCard}}>
        <div style={S.outHead}>
          <label style={S.label}>Working text</label>
          <button style={S.btnCopy} onClick={copyOutput}>Copy</button>
        </div>
        <p style={S.output}>{workingText}</p>
      </section>

      <footer style={S.footer}>
        This is a heuristic tool, not a forensic detector. It estimates
        AI-likelihood from writing patterns &mdash; sentence rhythm, structure,
        predictability and vocabulary &mdash; so treat the percentage as a
        rough guide, never proof. Human writing, especially formal clinical
        or academic prose, can score high. In medical writing some flagged
        words (&ldquo;significant&rdquo;, &ldquo;vital&rdquo;) are often correct; reread before
        swapping.
      </footer>
    </div>
  );
}

/* circular score gauge */
function Gauge({score}){
  const r=52,c=2*Math.PI*r;
  const off=c*(1-score/100);
  const color=score>=60?"#dc2626":score>=30?"#d97706":"#16a34a";
  return (
    <div style={S.gaugeWrap}>
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={r} fill="none" stroke="#e2e8f0"
          strokeWidth="13"/>
        <circle cx="70" cy="70" r={r} fill="none" stroke={color}
          strokeWidth="13" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={off}
          transform="rotate(-90 70 70)"
          style={{transition:"stroke-dashoffset .5s ease, stroke .3s ease"}}/>
        <text x="70" y="66" textAnchor="middle"
          style={{fontSize:30,fontWeight:800,fill:color,

}

/* module-level cache: each word is fetched from the API only once.
   key = lowercase clean word, value = array of alternatives. */
const SYN_CACHE={};

/* Fetch alternatives for ANY word. Runs a fallback chain so that
   even words with no true synonyms still return something:
     1. rel_syn  — strict synonyms
     2. ml       — "means like" (looser meaning matches)
     3. rel_trg  — words triggered by / associated with the word
   Results from all reached strategies are merged and de-duplicated. */
/* Look a word up in the offline thesaurus, also trying simple
   de-inflected forms so "risks"->"risk", "increased"->"increase",
   "studies"->"study", "running" stays as-is if no base found. */
function thesaurusLookup(word){
  const w=word.toLowerCase().replace(/[^a-z'-]/g,"");
  if(!w)return[];
  if(MINI_THESAURUS[w])return MINI_THESAURUS[w];
  const tries=[];
  if(w.endsWith("ies"))tries.push(w.slice(0,-3)+"y");
  if(w.endsWith("es"))tries.push(w.slice(0,-2));
  if(w.endsWith("s"))tries.push(w.slice(0,-1));
  if(w.endsWith("ed"))tries.push(w.slice(0,-2),w.slice(0,-1));
  if(w.endsWith("ing")){
    tries.push(w.slice(0,-3),w.slice(0,-3)+"e");
  }
  if(w.endsWith("ly"))tries.push(w.slice(0,-2));
  for(const t of tries){
    if(MINI_THESAURUS[t])return MINI_THESAURUS[t];
  }
  return[];
}

async function fetchSynonyms(word){
  const w=word.toLowerCase().replace(/[^a-z'-]/g,"");
  if(!w)return[];
  if(SYN_CACHE[w])return SYN_CACHE[w];           // cache hit

  const strategies=[
    "rel_syn="+encodeURIComponent(w)+"&max=12",
    "ml="+encodeURIComponent(w)+"&max=14",
    "rel_trg="+encodeURIComponent(w)+"&max=12",
  ];
  const seen=new Set([w]);
  const out=[];

  /* Datamuse sends no CORS header, so a direct browser fetch is
     often blocked. Try direct first, then a public CORS proxy. */
  async function tryFetch(qs){
    const direct="https://api.datamuse.com/words?"+qs;
    try{
      const r=await fetch(direct);
      if(r.ok)return await r.json();
    }catch(e){/* fall through to proxy */}
    try{
      const proxied="https://corsproxy.io/?url="+encodeURIComponent(direct);
      const r2=await fetch(proxied);
      if(r2.ok)return await r2.json();
    }catch(e){/* give up on this strategy */}
    return null;
  }

  for(const qs of strategies){
    const data=await tryFetch(qs);
    if(Array.isArray(data)){
      for(const item of data){
        const cand=(item.word||"").toLowerCase();
        if(!cand||seen.has(cand))continue;
        if(cand.split(" ").length>3)continue;   // skip long phrases
        if(/[^a-z' -]/.test(cand))continue;     // skip odd tokens
        seen.add(cand);
        out.push(item.word);
      }
    }
    if(out.length>=10)break;
  }

  const result=out.slice(0,12);
  SYN_CACHE[w]=result;                            // store in cache
  return result;
}

/* cache for dictionary definitions, same idea as SYN_CACHE */
const DEF_CACHE={};

/* Fetch the dictionary definition from the Free Dictionary API.
   This API allows browser (CORS) access, so the online check-up
   genuinely works. Returns an object with a clear status:
     {status:"ok", senses:[...], dictSyn:[...]}  — found online
     {status:"notfound"}                          — online, no entry
     {status:"offline"}                           — network failed
   so the UI can tell the user exactly what happened. */
async function fetchDefinition(word){
  const w=word.toLowerCase().replace(/[^a-z'-]/g,"");
  if(!w)return{status:"notfound"};
  if(DEF_CACHE[w]!==undefined)return DEF_CACHE[w];   // cache hit

  let res;
  try{
    const r=await fetch(
      "https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(w),
      {signal:AbortSignal.timeout?AbortSignal.timeout(8000):undefined});
    if(r.status===404){
      res={status:"notfound"};
    }else if(!r.ok){
      res={status:"offline"};
    }else{
      const data=await r.json();
      if(!Array.isArray(data)||!data[0]||!data[0].meanings){
        res={status:"notfound"};
      }else{
        const senses=[];
        const dictSyn=new Set();
        for(const meaning of data[0].meanings){
          const pos=meaning.partOfSpeech||"";
          (meaning.synonyms||[]).forEach(s=>dictSyn.add(s));
          for(const d of(meaning.definitions||[])){
            if(d.definition)senses.push({pos,definition:d.definition});
            (d.synonyms||[]).forEach(s=>dictSyn.add(s));
            if(senses.length>=3)break;
          }
          if(senses.length>=3)break;
        }
        res={status:"ok",senses,dictSyn:Array.from(dictSyn).slice(0,8)};
      }
    }
  }catch(e){
    /* network blocked, timed out, or DNS failure */
    res={status:"offline"};
  }
  /* only cache definitive answers; let "offline" be retried later */
  if(res.status!=="offline")DEF_CACHE[w]=res;
  return res;
}

function Popover({label,weight,alts,swapped,onPick,onUndo,onClose}){
  const [custom,setCustom]=useState("");
  const [fetched,setFetched]=useState(null); // synonyms; null = not loaded
  const [loading,setLoading]=useState(false);
  const [defn,setDefn]=useState(undefined); // undefined=not loaded, null=none
  const [defLoading,setDefLoading]=useState(false);
  const flagged=weight>0;
  const tag=flagged?(WEIGHT_LABEL[weight]||"flag"):"any word";
  const tagColor=weight===3?"#7f1d1d":weight===2?"#b91c1c"
    :weight===1?"#a16207":"#475569";

  const presetAlts=(alts||[]).filter(Boolean);
  const cleanWord=label.toLowerCase().replace(/[^a-z'-]/g,"");
  const miniAlts=thesaurusLookup(label);

  const loadSynonyms=async()=>{
    setLoading(true);
    const syn=await fetchSynonyms(label);
    setFetched(syn);
    setLoading(false);
  };
  const loadDefinition=async()=>{
    setDefLoading(true);
    const d=await fetchDefinition(label);
    setDefn(d);
    setDefLoading(false);
  };

  /* auto-load synonyms AND the dictionary definition the moment the
     popover opens. cached words show instantly with no spinner. */
  React.useEffect(()=>{
    if(SYN_CACHE[cleanWord])setFetched(SYN_CACHE[cleanWord]);
    else loadSynonyms();
    if(DEF_CACHE[cleanWord]!==undefined)setDefn(DEF_CACHE[cleanWord]);
    else loadDefinition();
  // eslint-disable-next-line
  },[]);

  /* dictionary-provided synonyms get merged into the live list */
  const dictSyn=(defn&&defn.dictSyn)||[];
  const liveAlts=(fetched||[]).concat(dictSyn).filter(
    (a,idx,arr)=>a&&!presetAlts.includes(a)&&!miniAlts.includes(a)
      &&arr.indexOf(a)===idx);
  const totalShown=presetAlts.length+miniAlts.length+liveAlts.length;

  return (
    <div className="pop" style={S.pop}>
      <div style={S.popHead}>
        <span style={S.popWord}>&ldquo;{label}&rdquo;</span>
        <span style={{...S.popTag,background:tagColor}}>{tag}</span>
        <button style={S.popX} onClick={onClose}>&times;</button>
      </div>

      {/* online dictionary check-up */}
      {defLoading&&(
        <div style={S.defBox}>
          <span style={S.defStatus}>
            <span style={S.dotChecking}/> Checking online dictionary&hellip;
          </span>
        </div>
      )}
      {!defLoading&&defn&&defn.status==="ok"&&(
        <div style={S.defBox}>
          <div style={S.defStatusOk}>
            <span style={S.dotOk}/> Checked online &mdash; Free Dictionary
          </div>
          {defn.senses.map((sn,k)=>(
            <div key={k} style={S.defSense}>
              {sn.pos&&<span style={S.defPos}>{sn.pos}</span>}
              <span style={S.defText}>{sn.definition}</span>
            </div>
          ))}
        </div>
      )}
      {!defLoading&&defn&&defn.status==="notfound"&&(
        <div style={S.defBox}>
          <div style={S.defStatusOk}>
            <span style={S.dotOk}/> Checked online
          </div>
          <span style={S.popNone}>
            No dictionary entry &mdash; this may be a name, abbreviation,
            or specialist term.
          </span>
        </div>
      )}
      {!defLoading&&defn&&defn.status==="offline"&&(
        <div style={S.defBoxWarn}>
          <div style={S.defStatusWarn}>
            <span style={S.dotWarn}/> Online check unavailable
          </div>
          <span style={S.popNone}>
            Couldn&rsquo;t reach the dictionary &mdash; showing built-in
            suggestions below. <button style={S.retryBtn}
              onClick={loadDefinition}>Retry</button>
          </span>
        </div>
      )}

      {presetAlts.length>0&&(
        <>
          <div style={S.popSection}>humanizing swaps</div>
          <div style={S.popAlts}>
            {presetAlts.map(a=>(
              <button key={a} style={S.altBtn} onClick={()=>onPick(a)}>{a}</button>
            ))}
          </div>
        </>
      )}

      {miniAlts.length>0&&(
        <>
          <div style={S.popSection}>synonyms</div>
          <div style={S.popAlts}>
            {miniAlts.map(a=>(
              <button key={a} style={S.altBtn} onClick={()=>onPick(a)}>{a}</button>
            ))}
          </div>
        </>
      )}

      {/* live-fetched synonyms — loaded for every word */}
      <div style={S.popSection}>
        {presetAlts.length+miniAlts.length>0?"more synonyms":"synonyms"}
        {loading&&<span style={S.popLoad}> loading&hellip;</span>}
      </div>
      {liveAlts.length>0&&(
        <div style={S.popAlts}>
          {liveAlts.map(a=>(
            <button key={a} style={S.altBtn} onClick={()=>onPick(a)}>{a}</button>
          ))}
        </div>
      )}
      {!loading&&fetched!==null&&liveAlts.length===0&&(
        <span style={S.popNone}>
          {totalShown>0
            ?"No further synonyms found."
            :"No synonyms found \u2014 type your own below."}
        </span>
      )}
      {loading&&liveAlts.length===0&&(
        <span style={S.popNone}>Searching the thesaurus&hellip;</span>
      )}

      <div style={S.popCustom}>
        <input style={S.popInput} value={custom}
          placeholder="or type your own..."
          onChange={e=>setCustom(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&custom.trim())onPick(custom.trim());}}/>
        <button style={S.popGo}
          onClick={()=>custom.trim()&&onPick(custom.trim())}>Use</button>
      </div>
      {swapped&&(
        <button style={S.popUndo} onClick={onUndo}>&#8634; Revert to original</button>
      )}
    </div>
  );
}
